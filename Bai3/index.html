<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Products Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <main class="container py-4">
      <header class="mb-4">
        <div class="d-flex flex-column flex-md-row align-items-md-end gap-3">
          <div class="flex-grow-1">
            <h1 class="h3 fw-bold mb-1">Products Dashboard</h1>
            <p class="text-muted mb-0">
              Tra cứu sản phẩm, sắp xếp, phân trang và xem mô tả nhanh khi di chuột.
            </p>
          </div>
          <div class="stat-box">
            <div class="stat-label">Tổng sản phẩm</div>
            <div id="totalCount" class="stat-value">0</div>
          </div>
        </div>
      </header>

      <div class="d-flex flex-column flex-md-row gap-3 align-items-md-end mb-3">
        <div class="flex-grow-1">
          <label for="search" class="form-label">Tìm kiếm theo title</label>
          <input
            id="search"
            class="form-control"
            type="text"
            placeholder="Nhập title..."
          />
        </div>
        <div>
          <label for="pageSize" class="form-label">Số phần tử / trang</label>
          <select id="pageSize" class="form-select">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
          </select>
        </div>
      </div>

      <div class="card shadow-sm dashboard-card">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover align-middle dashboard-table">
              <thead>
                <tr>
                  <th style="width: 70px;">ID</th>
                  <th style="width: 120px;">Ảnh</th>
                  <th>
                    Title
                    <button
                      class="btn btn-sm btn-outline-secondary ms-2 sort-btn"
                      data-sort="title"
                    >
                      Sort
                    </button>
                  </th>
                  <th>
                    Giá
                    <button
                      class="btn btn-sm btn-outline-secondary ms-2 sort-btn"
                      data-sort="price"
                    >
                      Sort
                    </button>
                  </th>
                  <th>Category</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
          <div class="d-flex align-items-center justify-content-between mt-3">
            <div id="resultInfo" class="text-muted small"></div>
            <nav>
              <ul id="pagination" class="pagination mb-0"></ul>
            </nav>
          </div>
        </div>
      </div>

      <div id="status" class="text-center text-muted mt-4"></div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
